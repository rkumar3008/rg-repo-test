trigger:
- main

pool: rk-self-hosted-pool

steps:
- task: TerraformInstaller@1
  displayName: Terraform install
  inputs:
    terraformVersion: 'latest'

- task: TerraformTask@5
  displayName: init
  inputs:
    provider: 'azurerm'
    command: 'init'
    backendServiceArm: 'Managed-id-service-connection'
    backendAzureRmOverrideSubscriptionID: 'f7c92316-e35c-46d7-8627-eb58c8587ec6'
    backendAzureRmResourceGroupName: 'rk-rg'
    backendAzureRmStorageAccountName: 'commonstg1'
    backendAzureRmContainerName: 'statecontainer'
    backendAzureRmKey: 'rk_state.tf'

- task: TerraformTask@5
  displayName: validate
  inputs:
    provider: 'azurerm'
    command: 'validate'

- task: TerraformTask@5
  displayName: plan
  inputs:
    provider: 'azurerm'
    command: 'plan'
    environmentServiceNameAzureRM: 'Managed-id-service-connection'


- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'apply'
    commandOptions: '--auto-approve'
    environmentServiceNameAzureRM: 'Managed-id-service-connection'