#######################Using Jobs###################

trigger:
- main

pool: rk-self-hosted-pool

jobs:
  - job: terraform_install_inite
    displayName: terraform_install_inite
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'
    
    - task: TerraformTask@5
      displayName: init
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'Service-connection-Managed-id'
        backendAzureRmResourceGroupName: 'rk-rg'
        backendAzureRmStorageAccountName: 'sidharthstga'
        backendAzureRmContainerName: 'rk-container'
        backendAzureRmKey: 'rk_state.tf'
  - job: terraform_plan
    displayName: terraform_validate_plan
    steps:
    - task: TerraformTask@5
      displayName: validate
      inputs:
        provider: 'azurerm'
        command: 'validate'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: 'Service-connection-Managed-id'
  # - job: namual_validation
  #   displayName: manual_validation
  #   pool: server
  #   steps:
  #   - task: ManualValidation@1
  #     inputs:
  #       notifyUsers: '2ranjeetkr@gmail.com'
  #       approvers: '2ranjeetkr@gmail.com'

  - job: apply
    displayName: apply
    dependsOn: terraform_plan
    steps:
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'apply'
        commandOptions: '--auto-approve'
        environmentServiceNameAzureRM: 'Service-connection-Managed-id'